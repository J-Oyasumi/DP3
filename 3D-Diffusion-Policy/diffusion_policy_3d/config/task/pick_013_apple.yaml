name: mshab_pick_apple

task_name: pick_013_apple

shape_meta: &shape_meta

  obs:
    point_cloud:
      shape: [1024, 6]
      type: point_cloud
    agent_pos:
      shape: [12]
      type: low_dim
  action:
    shape: [13]

env_runner:
  _target_: diffusion_policy_3d.env_runner.mshab_runner.MSHABRunner
  eval_episodes: 100
  output_dir: ./output

dataset:
  _target_: diffusion_policy_3d.dataset.mshab_dataset.MSHABDataset
  zarr_path: /data/jh/mshab/no_crop/pick/train/013_apple/zarr
  horizon: 2
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 0
  val_ratio: 0.02
